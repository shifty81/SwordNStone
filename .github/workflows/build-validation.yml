name: Build & Test

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (.NET 8.0)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Generate protocol files
      run: |
        sudo apt-get install -y mono-runtime
        mono CodeGenerator.exe Packet.proto
        # Fix CS0108 warnings in generated file
        sed -i 's/^\([[:space:]]*\)public int GetType()/\1public new int GetType()/' Packet.Serializer.ci.cs

    - name: Restore dependencies
      run: dotnet restore SwordAndStone.sln

    - name: Build solution
      run: dotnet build SwordAndStone.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test SwordAndStone.Tests/SwordAndStone.Tests.csproj --configuration Release --no-build --verbosity normal
